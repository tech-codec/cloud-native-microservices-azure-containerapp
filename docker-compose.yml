version: "3.8"

services:
  # 🐘 PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # 🍃 MongoDB
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MONGO_PORT}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # 👤 User Service
  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${USER_SERVICE_PORT}
    depends_on:
      - postgres
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 📦 Order Service
  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: ${ORDER_SERVICE_PORT}
    depends_on:
      - mongo
    ports:
      - "${ORDER_SERVICE_PORT}:${ORDER_SERVICE_PORT}"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 🌐 API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}
      PORT: ${API_GATEWAY_PORT}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      - user-service
      - order-service
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --timeout=2000 http://localhost:${API_GATEWAY_PORT}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
      - frontend_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 🖥 Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - frontend_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  mongodata:

networks:
  backend:
    driver: bridge
  frontend_net:
    driver: bridge
